apiVersion: v1
kind: Service
metadata:
  name: vllm-gemma-4-31b-service
  labels:
    # --- Label for selection (matches the pods) ---
    app: vllm-gemma-4-31b
    # --- Labels for GKE Observability ---
    ai.gke.io/model: gemma-4-31b-it
    ai.gke.io/inference-server: vllm
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http 
    protocol: TCP
    name: http
  selector:
    # This MUST match the 'app' label in the Deployment's pod template
    app: vllm-gemma-4-31b